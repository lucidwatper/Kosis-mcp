services:
  - type: web
    name: kosis-question-mcp
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: HOST
        value: 0.0.0.0
      - key: KOSIS_CACHE_DIR
        value: /tmp/kosis-mcp-cache
      - key: KOSIS_CACHE_TTL_MS
        value: 21600000
      - key: KOSIS_TIMEOUT_MS
        value: 20000
      - key: KOSIS_DEFAULT_LIMIT
        value: 5
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
